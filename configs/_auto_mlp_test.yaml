experiment_name: mlp_test
group_col: species number
id_col: sample number
model_params:
  batch_size: 64
  dropout: 0.3
  epochs: 500
  hidden_sizes:
  - 256
  - 128
  - 64
  lr: 0.001
  patience: 30
  seed: 42
  verbose: 0
  weight_decay: 0.0001
model_type: mlp
n_folds: 5
preprocess:
- name: emsc
- deriv: 1
  name: sg
  polyorder: 2
  window_length: 7
- bin_size: 8
  name: binning
- name: standard_scaler
seed: 42
shuffle: true
split_method: group_kfold
target_col: 含水率
test_file: test.csv
train_file: train.csv
