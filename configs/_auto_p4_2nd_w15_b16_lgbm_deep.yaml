experiment_name: p4_2nd_w15_b16_lgbm_deep
group_col: species number
id_col: sample number
model_params:
  colsample_bytree: 0.5
  learning_rate: 0.05
  max_depth: 5
  min_child_samples: 10
  n_estimators: 400
  num_leaves: 20
  reg_alpha: 1.0
  reg_lambda: 1.0
  subsample: 0.7
  verbose: -1
model_type: lgbm
n_folds: 5
preprocess:
- name: snv
- deriv: 2
  name: sg
  polyorder: 3
  window_length: 15
- bin_size: 16
  name: binning
- name: standard_scaler
seed: 42
shuffle: true
split_method: group_kfold
target_col: 含水率
test_file: test.csv
train_file: train.csv
