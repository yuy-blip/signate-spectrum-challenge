experiment_name: p4_feat_heavy
group_col: species number
id_col: sample number
model_params:
  colsample_bytree: 0.5
  learning_rate: 0.01
  max_depth: 3
  n_estimators: 2000
  reg_alpha: 5.0
  reg_lambda: 10.0
  subsample: 0.7
  tree_method: hist
model_type: xgb
n_folds: 5
preprocess:
- name: snv
- deriv: 1
  name: sg
  polyorder: 2
  window_length: 7
- bin_size: 16
  name: binning
- name: band_ratio
- n_regions: 12
  name: spectral_stats
  stats:
  - mean
  - std
  - slope
  - max
  - min
  - skew
- n_components: 20
  name: pca_features
- name: standard_scaler
seed: 42
shuffle: true
split_method: group_kfold
target_col: 含水率
test_file: test.csv
train_file: train.csv
