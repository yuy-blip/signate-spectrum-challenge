# Wavelength-selected (water absorption bands) + SNV + SG + PLS
experiment_name: wn_select_pls

train_file: train.csv
test_file: test.csv
id_col: "sample number"
target_col: "含水率"

preprocess:
  - name: select_wn
    ranges: [[4500, 5500], [6500, 7500], [8000, 9000]]
  - name: snv
  - name: sg
    window_length: 11
    polyorder: 2
    deriv: 0
  - name: standard_scaler

model_type: pls
model_params:
  n_components: 20

n_folds: 5
split_method: kfold
seed: 42
shuffle: true
