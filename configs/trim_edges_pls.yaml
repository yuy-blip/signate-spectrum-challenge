# Trim noisy edges + SNV + SG + PLS
experiment_name: trim_edges_pls

train_file: train.csv
test_file: test.csv
id_col: "sample number"
target_col: "含水率"

preprocess:
  - name: select_wn
    ranges: [[4200, 9800]]
  - name: snv
  - name: sg
    window_length: 11
    polyorder: 2
    deriv: 0
  - name: standard_scaler

model_type: pls
model_params:
  n_components: 28

n_folds: 5
split_method: kfold
seed: 42
shuffle: true
