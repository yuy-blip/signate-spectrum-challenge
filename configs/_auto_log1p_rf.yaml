experiment_name: log1p_rf
group_col: species number
id_col: sample number
model_params:
  max_depth: 10
  max_features: 0.5
  min_samples_leaf: 5
  n_estimators: 500
  n_jobs: -1
model_type: rf
n_folds: 5
preprocess:
- name: snv
- deriv: 1
  name: sg
  polyorder: 2
  window_length: 11
- bin_size: 8
  name: binning
- name: standard_scaler
seed: 42
shuffle: true
split_method: group_kfold
target_col: 含水率
target_transform: log1p
target_transform_lambda: 0.5
test_file: test.csv
train_file: train.csv
