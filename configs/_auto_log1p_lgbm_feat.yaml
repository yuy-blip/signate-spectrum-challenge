experiment_name: log1p_lgbm_feat
group_col: species number
id_col: sample number
model_params:
  colsample_bytree: 0.5
  learning_rate: 0.01
  max_depth: 4
  min_child_samples: 15
  n_estimators: 2000
  num_leaves: 15
  reg_alpha: 3.0
  reg_lambda: 5.0
  subsample: 0.7
  verbose: -1
model_type: lgbm
n_folds: 5
preprocess:
- name: snv
- deriv: 1
  name: sg
  polyorder: 2
  window_length: 11
- name: band_ratio
- n_regions: 10
  name: spectral_stats
- name: standard_scaler
seed: 42
shuffle: true
split_method: group_kfold
target_col: 含水率
target_transform: log1p
target_transform_lambda: 0.5
test_file: test.csv
train_file: train.csv
