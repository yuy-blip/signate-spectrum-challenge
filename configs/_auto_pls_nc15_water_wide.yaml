experiment_name: pls_nc15_water_wide
group_col: species number
id_col: sample number
model_params:
  n_components: 15
model_type: pls
n_folds: 5
preprocess:
- name: emsc
- deriv: 1
  name: sg
  polyorder: 2
  window_length: 7
- name: wavelength_selector
  ranges:
  - - 6000
    - 7800
  - - 4500
    - 5800
  - - 3999
    - 4700
- name: standard_scaler
seed: 42
shuffle: true
split_method: group_kfold
target_col: 含水率
test_file: test.csv
train_file: train.csv
