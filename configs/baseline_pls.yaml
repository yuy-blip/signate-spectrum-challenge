# Baseline PLS regression for NIR spectral data
experiment_name: baseline_pls

# --- data ---
train_file: train.csv
test_file: test.csv
id_col: "sample number"
target_col: "含水率"

# --- preprocessing ---
preprocess:
  - name: snv
  - name: sg
    window_length: 11
    polyorder: 2
    deriv: 0
  - name: standard_scaler

# --- model ---
model_type: pls
model_params:
  n_components: 10

# --- CV ---
n_folds: 5
split_method: group_kfold
group_col: "species number"
seed: 42
shuffle: true
