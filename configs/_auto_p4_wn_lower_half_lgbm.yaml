experiment_name: p4_wn_lower_half
group_col: species number
id_col: sample number
model_params:
  colsample_bytree: 0.5
  learning_rate: 0.05
  max_depth: 3
  min_child_samples: 20
  n_estimators: 400
  num_leaves: 7
  reg_alpha: 1.0
  reg_lambda: 1.0
  subsample: 0.7
  verbose: -1
model_type: lgbm
n_folds: 5
preprocess:
- end_idx: 1557
  name: wavelength_selector
  start_idx: 780
- name: snv
- deriv: 1
  name: sg
  polyorder: 2
  window_length: 7
- name: standard_scaler
seed: 42
shuffle: true
split_method: group_kfold
target_col: 含水率
test_file: test.csv
train_file: train.csv
