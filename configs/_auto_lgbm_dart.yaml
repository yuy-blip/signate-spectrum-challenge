experiment_name: lgbm_dart
group_col: species number
id_col: sample number
model_params:
  boosting_type: dart
  colsample_bytree: 0.5
  drop_rate: 0.1
  learning_rate: 0.01
  max_depth: 3
  min_child_samples: 20
  n_estimators: 2000
  num_leaves: 7
  reg_alpha: 5.0
  reg_lambda: 10.0
  subsample: 0.7
  verbose: -1
model_type: lgbm
n_folds: 5
preprocess:
- name: snv
- deriv: 1
  name: sg
  polyorder: 2
  window_length: 11
- bin_size: 8
  name: binning
- name: standard_scaler
seed: 42
shuffle: true
split_method: group_kfold
target_col: 含水率
test_file: test.csv
train_file: train.csv
