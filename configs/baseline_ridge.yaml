# Baseline Ridge regression for NIR spectral data
experiment_name: baseline_ridge

# --- data ---
train_file: train.csv
test_file: test.csv
id_col: "sample number"
target_col: "含水率"

# --- preprocessing ---
preprocess:
  - name: snv
  - name: sg
    window_length: 11
    polyorder: 2
    deriv: 1
  - name: standard_scaler

# --- model ---
model_type: ridge
model_params:
  alpha: 1.0

# --- CV ---
n_folds: 5
split_method: kfold
seed: 42
shuffle: true
